name: iOS TestFlight

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-testflight:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/ci.mobileprovision"
          mkdir -p "$(dirname "$PROFILE_PATH")"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

      - name: Sync iOS packaging files
        run: |
          cp src-tauri/ios/PrivacyInfo.xcprivacy src-tauri/gen/apple/ai-file-manager_iOS/PrivacyInfo.xcprivacy
          cp scripts/ExportOptions-app-store.plist src-tauri/gen/apple/ExportOptions.plist

      - name: Build App Store IPA
        run: npm run tauri ios build -- --export-method app-store --ci

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-appstore-ipa
          path: src-tauri/gen/apple/build/arm64/AI File Manager.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v')
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: src-tauri/gen/apple/build/arm64/AI File Manager.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
